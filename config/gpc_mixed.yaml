data:
    dataset_type: "cached_threedfront"
    encoding_type: "cached_diffusion_cosin_angle_wocm"
    # Resolves under PATH_TO_PROCESSED_DATA (../ThreedFront/output/3d_front_processed/).
    # i.e. GPC rooms live at ../ThreedFront/output/3d_front_processed/gpc/<tag>/boxes.npz
    dataset_directory: "gpc"
    # Resolves under PATH_TO_DATASET_FILES (../ThreedFront/dataset_files/).
    annotation_file: "gpc_threed_front_splits.csv"
    augmentations: ["fixed_rotations"]
    train_stats: "dataset_stats.txt"
    room_layout_size: "64,64"

network:
    type: "diffusion_scene_layout_mixed"

    # encoding dim
    # NOTE: sample_num_points is used as max_length and MUST be >= the largest
    # room's object count across ALL splits, otherwise get_encoded_dataset asserts.
    # Run scripts/make_gpc_splits.py to print the recommended value and set it here.
    sample_num_points: 25
    angle_dim: 2

    # room mask condition
    # With feature_extractor "pointnet_simple", the floor-plan condition comes from
    # fpbpn (4-d points), not the room_layout image, so the image is not loaded at
    # train time (train_diffusion.py only loads it for resnet18). room_layout is
    # still kept in boxes.npz for evaluation/rendering.
    room_mask_condition: true
    room_latent_dim: 64

    # position condition
    position_condition: false
    position_emb_dim: 0

    # diffusion config
    time_num: 1000
    diffusion_semantic_kwargs:
        att_1: 0.99999
        att_T: 0.000009
        ctt_1: 0.000009
        ctt_T: 0.99999
        model_output_type: 'x0'
        mask_weight: 1
        auxiliary_loss_weight: 0.0005
        adaptive_auxiliary_loss: True
    diffusion_geometric_kwargs:
        schedule_type: 'linear'
        beta_start: 0.0001
        beta_end: 0.02
        loss_type: 'mse'
        model_mean_type: 'eps'
        model_var_type: 'fixedsmall'

    # denoising net
    net_type: "transformer"
    net_kwargs:
        seperate_all: True
        n_layer: 8
        n_embd: 512
        n_head: 4
        dim_feedforward: 2048
        dropout: 0.1
        activate: 'GELU'
        timestep_type: 'adalayernorm_abs'
        mlp_type: 'fc'

feature_extractor:
    name: "pointnet_simple"
    feat_units: [4, 64, 64, 512, 64]

training:
    splits: ["train", "val"]
    epochs: 50000
    batch_size: 512
    save_frequency: 2000
    max_grad_norm: 10
    # optimizer
    optimizer: Adam
    weight_decay: 0.0
    # schedule
    schedule: 'step'
    lr: 0.0002
    lr_step: 10000
    lr_decay: 0.5

validation:
    splits: ["test"]
    frequency: 100
    batch_size: 512

logger:
    type: "wandb"
    project: "MiDiffusion"
